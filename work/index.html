    footer{display:grid;grid-template-columns:auto minmax(240px,1fr);grid-template-areas:'controls thumbs' 'hint thumbs';align-items:center;gap:8px 20px;justify-self:stretch;max-width:min(52vw,760px);margin:0 auto;z-index:6}.controls{grid-area:controls;display:flex;align-items:center;gap:10px}.circle{width:44px;height:44px;border-radius:50%;border:1px solid rgba(232,221,208,.16);background:rgba(232,221,208,.04);cursor:pointer;color:var(--cream);font-size:24px;line-height:1;transition:.25s ease}.circle:hover{border-color:rgba(126,200,164,.55);color:var(--mint);background:rgba(126,200,164,.1)}

{id:'ucon',title:'Ucon',subtitle:'Barbican Shoot',category:'Fashion',date:'August 2025',role:'Director · DP · Editor',clips:[{poster:'https://media.zainaussaleem.com/assets/Culture/Ucon/ucon-preview.gif',video:'https://media.zainaussaleem.com/assets/Culture/Ucon/11---ucon-bag-collab-barbican.mp4',ratio:'9/16'}]},
{id:'incador',title:'Incador',subtitle:'Jewellery Co.',category:'Jewellery',date:'November 2025',role:'Director · DP · Editor',clips:[{poster:'https://media.zainaussaleem.com/assets/Culture/INCADOR/incador-preview.gif',video:'https://media.zainaussaleem.com/assets/Culture/INCADOR/21---incador-jewellery-2.mp4',ratio:'3/4'}]}]}
];
const requestedArchive=(location.hash||'').replace('#','').toLowerCase();
const archiveIndex=Math.max(0,CATEGORIES.findIndex(c=>c.id===requestedArchive));
const state={level:requestedArchive?1:0,cat:archiveIndex>=0?archiveIndex:1,project:0,clip:0,drag:false,startX:0,moved:false};
const $=id=>document.getElementById(id);
function currentList(){return state.level===0?CATEGORIES:state.level===1?CATEGORIES[state.cat].projects:CATEGORIES[state.cat].projects[state.project].clips}
function currentProject(){return state.level===0?CATEGORIES[state.cat].projects[0]:state.level===1?CATEGORIES[state.cat].projects[state.project]:CATEGORIES[state.cat].projects[state.project]}
function heroClipIndex(project){return project && project.id==='atlas'?2:0}
const CATEGORY_COVER_OVERRIDES={documentary:{proj:'suminder-virk',clip:0},sport:{proj:'atlas',clip:1},culture:{proj:'aadil-abedi',clip:0}};
function hero(item){ if(item.clips) return item.clips[0]; if(item.projects){ const o=CATEGORY_COVER_OVERRIDES[item.id]; if(o){ const p=item.projects.find(pr=>pr.id===o.proj); if(p && p.clips[o.clip]) return p.clips[o.clip]; } return item.projects[0].clips[0]; } return item }
function embed(id,muted=true){return `https://www.youtube.com/embed/${id}?autoplay=1&mute=${muted?1:0}&controls=1&modestbranding=1&rel=0&playsinline=1`}
const stageCardMap=new Map();
const filmThumbMap=new Map();
function keyFor(item,level){ if(level===0) return 'cat:'+item.id; if(level===1) return 'proj:'+item.id; return 'clip:'+(item.poster||item.video||item.youtube); }

let pos=state.level===0?state.cat:state.level===1?state.project:state.clip;
let lastFocusInt=Math.round(pos);
let velocity=0;
let isUserScrolling=false;
let rafId=null;
let wheelIdleTimer=null;

function clampPos(p){ const list=currentList(); return Math.max(0,Math.min(list.length-1,p)); }

function setCardContent(card,item,clip,isFocused,level,project){
 const wantVideo=isFocused && !!clip.video, wantYoutube=isFocused && !clip.video && !!clip.youtube;
 const desiredKind=wantVideo?'video':wantYoutube?'youtube':'img'; const srcId=clip.video||clip.youtube||clip.poster;
 if(card.dataset.kind===desiredKind && card.dataset.src===srcId) return;
 card.dataset.kind=desiredKind; card.dataset.src=srcId;
 if(desiredKind==='video') card.innerHTML=`<video src="${clip.video}" poster="${clip.poster}" muted autoplay loop playsinline></video>`;
 else if(desiredKind==='youtube') card.innerHTML=`<iframe src="${embed(clip.youtube,true)}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
 else card.innerHTML=`<img src="${clip.poster}" alt="${item.title||project.title}">`;
 const label=document.createElement('div'); label.className='open-label'; label.textContent=level===2?'Open Film':'Open'; card.appendChild(label);
}

function buildStageCards(){
 const stage=$('stage'); const list=currentList(); const level=state.level; const project=currentProject();
 const activeKeys=new Set();
 list.forEach((item,i)=>{
  const offset=i-pos; if(Math.abs(offset)>3.4)return;
  const key=keyFor(item,level); activeKeys.add(key);
  let card=stageCardMap.get(key);
  if(!card){ card=document.createElement('article'); card.className='cover'; stageCardMap.set(key,card); stage.appendChild(card); }
  const clip=hero(item);
  setCardContent(card,item,clip,i===lastFocusInt,level,project);
  card.onclick=()=>{ if(state.moved)return; if(i!==lastFocusInt){ if(state.level===0)state.cat=i; else if(state.level===1)state.project=i; else state.clip=i; render(); } else if(state.level<2){state.level++; if(state.level===1)state.project=Math.floor(CATEGORIES[state.cat].projects.length/2); if(state.level===2)state.clip=heroClipIndex(CATEGORIES[state.cat].projects[state.project]); render()} else openViewer(clip,project) };
 });
 for(const [key,card] of Array.from(stageCardMap.entries())){ if(!activeKeys.has(key)){ card.remove(); stageCardMap.delete(key); } }
}

function layoutStage(){
 const list=currentList(); const level=state.level;
 list.forEach((item,i)=>{
  const offset=i-pos; if(Math.abs(offset)>3.4)return;
  const key=keyFor(item,level); const card=stageCardMap.get(key); if(!card)return;
  const absOff=Math.min(Math.abs(offset),3.4);
  const sign=offset<0?-1:1;
  const rotAmt=Math.min(Math.abs(offset),1)*50;
  const r=-sign*rotAmt;
  const x=offset*58, z=-absOff*150;
  const s=Math.max(.55,1-absOff*.16);
  const opacity=Math.max(.16,1-absOff*.28);
  const brightness=Math.max(.35,1-absOff*.18);
  card.style.transform=`translateX(${x}%) translateZ(${z}px) rotateY(${r}deg) scale(${s})`;
  card.style.opacity=opacity;
  card.style.filter=`brightness(${brightness})`;
  card.style.zIndex=Math.round(1000-absOff*50);
  card.classList.toggle('focus', i===Math.round(pos));
 });
}

function renderFilmstrip(){
 const fs=$('filmstrip'); const list=currentList(); const level=state.level;
 const activeKeys=new Set();
 list.forEach((item,i)=>{
  const clip=hero(item); const key=keyFor(item,level); activeKeys.add(key);
  let t=filmThumbMap.get(key);
  if(!t){ t=document.createElement('button'); t.className='thumb'; fs.appendChild(t); filmThumbMap.set(key,t); }
  if(t.dataset.src!==clip.poster){ t.dataset.src=clip.poster; t.innerHTML=`<img src="${clip.poster}" alt="">`; }
  t.className='thumb'+(i===lastFocusInt?' active':'');
  t.onclick=()=>{if(state.level===0)state.cat=i;else if(state.level===1)state.project=i;else state.clip=i;render()};
 });
 for(const [key,t] of Array.from(filmThumbMap.entries())){ if(!activeKeys.has(key)){ t.remove(); filmThumbMap.delete(key); } }
 // keep DOM order in sync with list order
 list.forEach(item=>{ const t=filmThumbMap.get(keyFor(item,level)); if(t) fs.appendChild(t); });
}
function updateFilmstripActive(){
 const list=currentList(); const level=state.level;
 list.forEach((item,i)=>{ const t=filmThumbMap.get(keyFor(item,level)); if(t) t.classList.toggle('active', i===lastFocusInt); });
}

function updateTextPanel(){
 const cat=CATEGORIES[state.cat], project=currentProject();
 const title=state.level===0?cat.title:project.title; const subtitle=state.level===0?'Portfolio':project.subtitle;
 $('kicker').textContent=state.level===0?'Select Archive':state.level===1?cat.title+' / Projects':cat.title+' / Film';
 $('title').textContent=title; $('subtitle').textContent=state.level===0?cat.tagline:subtitle;
 $('meta').innerHTML= state.level===0 ? `<div><span>Archive</span><strong>${cat.projects.length} Projects</strong></div><div><span>Focus</span><strong>${cat.tagline}</strong></div><div><span>Mode</span><strong>Gallery View</strong></div><div><span>Action</span><strong>Click to Open</strong></div>` : `<div><span>Category</span><strong>${project.category}</strong></div><div><span>Year</span><strong>${project.date}</strong></div><div><span>Role</span><strong>${project.role}</strong></div><div><span>Clips</span><strong>${project.clips.length}</strong></div>`;
 const list=currentList();
 $('counter').textContent=String(lastFocusInt+1).padStart(2,'0')+' / '+String(list.length).padStart(2,'0'); $('backTop').style.visibility=state.level?'visible':'hidden';
 Array.from($('nav').children).forEach((b,i)=>b.classList.toggle('active', i===state.cat));
}

function commitFocus(){
 if(state.level===0)state.cat=lastFocusInt; else if(state.level===1)state.project=lastFocusInt; else state.clip=lastFocusInt;
 updateTextPanel();
 updateFilmstripActive();
 buildStageCards();
}

function ensureRaf(){ if(rafId===null) rafId=requestAnimationFrame(tick); }

function tick(){
 if(!state.drag && !isUserScrolling){
  if(Math.abs(velocity)>0.0006){
   pos=clampPos(pos+velocity);
   velocity*=0.9;
   if(Math.abs(velocity)<0.0008)velocity=0;
  } else {
   const target=Math.round(pos); const diff=target-pos;
   if(Math.abs(diff)>0.0015){ pos+=diff*0.16; } else { pos=target; }
  }
 }
 layoutStage();
 const rounded=Math.round(pos);
 if(rounded!==lastFocusInt){ lastFocusInt=rounded; commitFocus(); }
 const settled=!state.drag && !isUserScrolling && velocity===0 && Math.abs(pos-Math.round(pos))<0.0016;
 if(!settled){ rafId=requestAnimationFrame(tick); } else { rafId=null; }
}

function render(){
 const nav=$('nav');nav.innerHTML='';CATEGORIES.forEach((c,i)=>{const b=document.createElement('button');b.textContent=c.title;b.className=i===state.cat?'active':'';b.onclick=()=>{state.cat=i;state.level=0;state.project=0;state.clip=0;render()};nav.appendChild(b)});
 pos=state.level===0?state.cat:state.level===1?state.project:state.clip;
 velocity=0; isUserScrolling=false; lastFocusInt=Math.round(pos);
 if(rafId!==null){ cancelAnimationFrame(rafId); rafId=null; }
 updateTextPanel();
 buildStageCards();
 layoutStage();
 renderFilmstrip();
 syncHashAndTitle();
}
function syncHashAndTitle(){
 const newHash=state.level>=1?'#'+CATEGORIES[state.cat].id:'';
 if(location.hash!==newHash){ history.replaceState(null,'',location.pathname+newHash); }
 document.title=state.level>=1?CATEGORIES[state.cat].title+' — Zain Aus Saleem':'Work — Zain Aus Saleem';
}
window.addEventListener('popstate',()=>{
 const h=(location.hash||'').replace('#','').toLowerCase();
 const idx=CATEGORIES.findIndex(c=>c.id===h);
 state.level=idx>=0?1:0; state.cat=idx>=0?idx:state.cat; state.project=0; state.clip=0;
 render();
});
function viewerHTML(clip){return clip.video?`<video src="${clip.video}" poster="${clip.poster}" autoplay playsinline></video>`:clip.youtube?`<iframe src="${embed(clip.youtube,false)}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`:`<img src="${clip.poster}" alt="">`}
function enableControlsAfterStart(container){const vid=container.querySelector('video'); if(!vid)return; vid.addEventListener('playing',function onPlaying(){ vid.removeEventListener('playing',onPlaying); vid.controls=true; })}
function updateViewerArrows(){const clips=currentProject().clips; $('viewerPrev').style.display=state.clip<=0?'none':''; $('viewerNext').style.display=state.clip>=clips.length-1?'none':''}
function refreshViewer(){if(!$('overlay').classList.contains('show'))return; const project=currentProject(); const clip=project.clips[state.clip]; const v=$('viewer'); v.style.opacity='0'; setTimeout(()=>{ v.innerHTML=viewerHTML(clip); $('viewerCaption').textContent=project.title+' — '+project.subtitle; v.style.opacity='1'; updateViewerArrows(); enableControlsAfterStart(v); },160)}
function move(d){const list=currentList(); if(state.level===0)state.cat=Math.max(0,Math.min(list.length-1,state.cat+d)); else if(state.level===1)state.project=Math.max(0,Math.min(list.length-1,state.project+d)); else state.clip=Math.max(0,Math.min(list.length-1,state.clip+d)); render(); refreshViewer()}
function openViewer(clip,project){const v=$('viewer');v.style.opacity='1';v.innerHTML=viewerHTML(clip); $('viewerCaption').textContent=project.title+' — '+project.subtitle; $('overlay').classList.add('show'); updateViewerArrows(); enableControlsAfterStart(v)}
function closeViewer(){$('overlay').classList.remove('show');$('viewer').innerHTML=''}
$('prev').onclick=()=>move(-1);$('next').onclick=()=>move(1);$('backTop').onclick=()=>{state.level=Math.max(0,state.level-1);render()};$('close').onclick=closeViewer;$('viewerPrev').onclick=e=>{e.stopPropagation();move(-1)};$('viewerNext').onclick=e=>{e.stopPropagation();move(1)};$('overlay').onclick=e=>{if(e.target.id==='overlay')closeViewer()};document.addEventListener('keydown',e=>{if(e.key==='Escape'){if($('overlay').classList.contains('show'))closeViewer();else if(state.level){state.level--;render()}} if(e.key==='ArrowLeft')move(-1); if(e.key==='ArrowRight')move(1); if(e.key==='Enter'){if(state.level===0){state.level=1;state.project=Math.floor(CATEGORIES[state.cat].projects.length/2);render()} else if(state.level===1){const proj=CATEGORIES[state.cat].projects[state.project];state.level=2;state.clip=heroClipIndex(proj);render()} else openViewer(CATEGORIES[state.cat].projects[state.project].clips[state.clip],currentProject())}});

let dragLastX=0,dragLastT=0,dragVelSamples=[];
$('stage').addEventListener('pointerdown',e=>{state.drag=true;state.startX=e.clientX;state.moved=false;dragLastX=e.clientX;dragLastT=performance.now();dragVelSamples=[];velocity=0;ensureRaf();});
$('stage').addEventListener('pointermove',e=>{
 if(!state.drag)return;
 if(Math.abs(e.clientX-state.startX)>8)state.moved=true;
 const dx=e.clientX-dragLastX; const now=performance.now(); const dt=Math.max(1,now-dragLastT);
 pos=clampPos(pos-dx/250);
 dragVelSamples.push({dx,dt}); if(dragVelSamples.length>5)dragVelSamples.shift();
 dragLastX=e.clientX; dragLastT=now;
});
$('stage').addEventListener('pointerup',e=>{
 if(!state.drag)return;
 state.drag=false;
 if(dragVelSamples.length){
  const totalDx=dragVelSamples.reduce((s,d)=>s+d.dx,0);
  const totalDt=dragVelSamples.reduce((s,d)=>s+d.dt,0);
  const pxPerMs=totalDx/Math.max(1,totalDt);
  velocity=-(pxPerMs*16.67)/250;
 }
 setTimeout(()=>state.moved=false,0);
 ensureRaf();
});
window.addEventListener('wheel',e=>{
 if($('overlay').classList.contains('show'))return;
 if(Math.abs(e.deltaX)>Math.abs(e.deltaY))e.preventDefault();
 const delta=Math.abs(e.deltaY)>Math.abs(e.deltaX)?e.deltaY:e.deltaX;
 isUserScrolling=true; velocity=0;
 pos=clampPos(pos+delta/250);
 clearTimeout(wheelIdleTimer);
 wheelIdleTimer=setTimeout(()=>{isUserScrolling=false;ensureRaf();},120);
 ensureRaf();
},{passive:false});
document.addEventListener('mousemove',e=>{document.documentElement.style.setProperty('--mx',e.clientX/window.innerWidth*100+'%');document.documentElement.style.setProperty('--my',e.clientY/window.innerHeight*100+'%')});
render();
</script>
